tests {
  delta-uri = "http://delta:8080/v1"
  realm-uri = "http://keycloak:8080/realms"
  patience = 20 seconds
  clean-up = false

  elasticsearch {
    # Endpoint of the Elasticsearch cluster the assertions run against.
    base = "http://localhost:9200"
    # Whether the target cluster is Elasticsearch Serverless (changes index discovery and disallows some settings).
    serverless = false
    serverless = ${?ELASTICSEARCH_SERVERLESS}
    # Basic auth credentials, used unless an api key is provided.
    username = "elastic"
    username = ${?ELASTICSEARCH_USERNAME}
    password = "password"
    password = ${?ELASTICSEARCH_PASSWORD}
    # When set, an `ApiKey` Authorization header is used instead of basic auth (required for serverless).
    api-key = ${?ELASTICSEARCH_API_KEY}
  }
}

pekko {
  http {
    sse {
      # The maximum size for parsing server-sent events (96KiB).
      max-event-size = 98304
      # The maximum size for parsing lines of a server-sent event (48KiB).
      max-line-size = 49152
    }
  }
}

storage {
  max-file-size = 10737418240,
  s-3 {
    access-key = "MY_ACCESS_KEY"
    secret-key = "CHUTCHUT"
    prefix     = "/myprefix"
  }
}