include:
  - keycloak.yml
  - postgres.yml
  - elasticsearch.yml
  - blazegraph.yml
  - seaweedfs.yml

services:
  delta:
    depends_on:
      keycloak:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      blazegraph:
        condition: service_healthy
        required: false
      postgres:
        condition: service_started
      seaweedfs:
        condition: service_started
    environment:
      - DELTA_PLUGINS
      - DELTA_EXTERNAL_CONF
      - OTEL_SDK_DISABLED
      - CLUSTER_SIZE
      - PARTITION_STRATEGY
      - TABLES_AUTOCREATE=true
      - SPARQL_TARGET=blazegraph
      - SPARQL_ENDPOINT=http://blazegraph:9999/blazegraph
    image: ghcr.io/senscience/nexus-delta:latest
    entrypoint: ["/config/delta-startup.sh"]
    ports:
      - 8080:8080
    volumes:
      - ./config:/config
      - /tmp:/default-volume
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/version" ]
      interval: 1s
      timeout: 2s
      retries: 60

  delta2:
    depends_on:
      delta:
        condition: service_healthy
    environment:
      - DELTA_PLUGINS
      - DELTA_EXTERNAL_CONF
      - OTEL_SDK_DISABLED
      - CLUSTER_SIZE
      - NODE_INDEX=1
      - PARTITION_STRATEGY
      - SPARQL_TARGET=blazegraph
      - SPARQL_ENDPOINT=http://blazegraph:9999/blazegraph
    image: ghcr.io/senscience/nexus-delta:latest
    entrypoint: ["/config/delta-startup.sh"]
    ports:
      - 8081:8080
    volumes:
      - ./config:/config
      - /tmp:/default-volume
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/version" ]
      interval: 1s
      timeout: 2s
      retries: 60

  delta3:
    depends_on:
      delta2:
        condition: service_healthy
    environment:
      - DELTA_PLUGINS
      - DELTA_EXTERNAL_CONF
      - OTEL_SDK_DISABLED
      - PARTITION_STRATEGY
      - CLUSTER_SIZE
      - NODE_INDEX=2
      - SPARQL_TARGET=blazegraph
      - SPARQL_ENDPOINT=http://blazegraph:9999/blazegraph
    image: ghcr.io/senscience/nexus-delta:latest
    entrypoint: ["/config/delta-startup.sh"]
    ports:
      - 8082:8080
    volumes:
      - ./config:/config
      - /tmp:/default-volume
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/version" ]
      interval: 1s
      timeout: 2s
      retries: 60

