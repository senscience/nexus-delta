include:
  - keycloak.yml
  - postgres.yml
  - elasticsearch.yml
  - rdf4j.yml
  - seaweedfs.yml

services:
  delta:
    depends_on:
      keycloak:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      rdf4j:
        condition: service_healthy
        required: false
      postgres:
        condition: service_started
      seaweedfs:
        condition: service_started
    environment:
      - DELTA_PLUGINS
      - DELTA_EXTERNAL_CONF
      - OTEL_SDK_DISABLED
      - PARTITION_STRATEGY
      - SPARQL_TARGET=rdf4j
      - SPARQL_ENDPOINT=http://rdf4j:8080/rdf4j-server
    image: ghcr.io/senscience/nexus-delta:latest
    entrypoint: ["/config/delta-startup.sh"]
    ports:
      - 8080:8080
    volumes:
      - ./config:/config
      - /tmp:/default-volume

